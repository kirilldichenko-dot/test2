<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Telegram Tools Mini App</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1 class="app-title">Assistant Tools</h1>
        <p class="app-subtitle">Quick utilities inside Telegram</p>
      </header>

      <main class="app-main">
        <div class="buttons-grid">
          <button id="btn-password" class="primary-btn">
            🔐 Generate Password
          </button>

          <button id="btn-roll" class="primary-btn">
            🎲 Roll Dice
          </button>

          <button id="btn-flip" class="primary-btn">
            🪙 Flip Coin
          </button>

          <button id="btn-calc" class="primary-btn">
            🧮 Calculator
          </button>

          <button id="btn-time" class="primary-btn">
            🕒 Current Time
          </button>
        </div>

        <section class="panel">
          <h2 class="panel-title">Result</h2>
          <div id="result" class="result-box">
            Tap a button to see the result here.
          </div>
        </section>

        <section class="panel" id="calc-panel">
          <h2 class="panel-title">Calculator</h2>
          <div class="calc-row">
            <input
              id="calc-input"
              class="calc-input"
              type="text"
              placeholder="2 + 2 * 10"
              inputmode="decimal"
            />
            <button id="btn-calc-eval" class="secondary-btn">=</button>
          </div>
          <p class="calc-hint">Supports basic operations: + − × ÷ and brackets.</p>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
