<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Utility Tools</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1 class="app-title">Utility Tools</h1>
        <p class="app-subtitle">Password + Minesweeper</p>
      </header>

      <main class="app-main">
        <div class="buttons-grid">
          <button id="btn-password" class="primary-btn">
            🔐 Generate Password
          </button>
        </div>

        <section class="panel">
          <h2 class="panel-title">Result</h2>
          <div id="result" class="result-box">
            Tap “Generate Password” to see the result here.
          </div>
        </section>

        <section class="panel" id="minesweeper-panel">
          <div class="panel-row">
            <h2 class="panel-title panel-title--no-margin">Minesweeper</h2>
            <div class="panel-actions">
              <button id="btn-new-game" class="secondary-btn">New</button>
              <button id="btn-flag-mode" class="secondary-btn" aria-pressed="false">
                🚩 Off
              </button>
            </div>
          </div>

          <div class="ms-meta">
            <span id="ms-status" class="ms-status">Good luck!</span>
            <span id="ms-mines" class="ms-mines">💣 10</span>
          </div>

          <div id="ms-grid" class="ms-grid" role="grid" aria-label="Minesweeper grid"></div>
          <p class="calc-hint">
            Tip: Tap a cell to open. Turn on 🚩 mode to place flags.
          </p>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
